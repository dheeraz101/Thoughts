<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        textarea:focus { outline: none; }
        textarea::-webkit-scrollbar { display: none; }
        .dark-popup { background-color: #111; border-radius: 10px; padding: 20px; max-width: 90%; color: white; }
        #public-input::placeholder { color: gray; }
    </style>
</head>
<body class="bg-black text-white flex justify-center p-4">
    <div class="w-full max-w-xl">
        <header class="flex justify-between items-center p-4 border-b border-gray-700">
            <h1 class="text-xl font-bold">X Clone</h1>
            <button id="delete-all" class="text-red-500">Delete All</button>
        </header>
        
        <div class="p-4 border-b border-gray-700">
            <textarea id="public-input" class="w-full p-2 bg-black text-white border border-gray-700 rounded-md text-lg overflow-hidden" placeholder="What's on your mind?" maxlength="500"></textarea>
            <div class="flex justify-between items-center mt-2">
                <span id="char-count" class="text-gray-500">0/500</span>
                <button id="post-button" class="bg-blue-500 text-white px-4 py-2 rounded-md">Post</button>
            </div>
        </div>
        
        <div id="post-container" class="p-4"></div>
    </div>

    <div id="delete-confirmation" class="fixed inset-0 bg-black bg-opacity-60 hidden flex justify-center items-center p-4">
        <div class="dark-popup text-center">
            <p class="mb-4 text-lg font-medium">Delete post?</p>
            <p class="text-gray-400 text-sm mb-4">This can’t be undone and will be removed permanently.</p>
            <button id="confirm-delete" class="bg-red-500 text-white px-4 py-2 rounded-md w-full mb-2">Delete</button>
            <button id="cancel-delete" class="bg-gray-700 text-white px-4 py-2 rounded-md w-full">Cancel</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const postButton = document.getElementById("post-button");
            const postContainer = document.getElementById("post-container");
            const inputField = document.getElementById("public-input");
            const charCount = document.getElementById("char-count");
            const deleteAllButton = document.getElementById("delete-all");
            const deleteConfirmation = document.getElementById("delete-confirmation");
            const confirmDelete = document.getElementById("confirm-delete");
            const cancelDelete = document.getElementById("cancel-delete");
            let deleteIndex = null;
            
            inputField.addEventListener("input", function () {
                let text = inputField.value;
                text = text.replace(/#(\w+)/g, '<span class="text-blue-500">#$1</span>');
                inputField.innerHTML = text;
                inputField.style.height = "auto";
                inputField.style.height = inputField.scrollHeight + "px";
                const length = inputField.value.length;
                charCount.textContent = `${length}/500`;
                charCount.classList.toggle("text-red-500", length > 500);
            });
            
            function loadPosts() {
                const posts = JSON.parse(localStorage.getItem("posts")) || [];
                postContainer.innerHTML = "";
                posts.forEach((post, index) => {
                    const postElement = document.createElement("div");
                    postElement.classList.add("p-4", "border-b", "border-gray-700");
                    postElement.innerHTML = `
                        <div>
                            <p class="text-lg">${post.text.replace(/#(\w+)/g, '<span class="text-blue-500">#$1</span>')}</p>
                            <div class='flex justify-between text-gray-500 text-sm mt-2'>
                                <small>${post.timestamp.replace(/, /, ' • ')} • ${post.text.length} chars</small>
                                <button class="text-red-500 delete-post" data-index="${index}">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>
                    `;
                    postContainer.prepend(postElement);
                });
            }
            
            function savePost(text) {
                let posts = JSON.parse(localStorage.getItem("posts")) || [];
                const newPost = { text, timestamp: new Date().toLocaleString() };
                posts.push(newPost);
                localStorage.setItem("posts", JSON.stringify(posts));
                loadPosts();
            }
            
            postButton.addEventListener("click", function () {
                const text = inputField.value.trim();
                if (text === "" || text.length > 500) return;
                savePost(text);
                inputField.value = "";
                inputField.style.height = "auto";
                charCount.textContent = "0/500";
                charCount.classList.remove("text-red-500");
            });
            
            postContainer.addEventListener("click", function (event) {
                if (event.target.closest(".delete-post")) {
                    deleteIndex = event.target.closest(".delete-post").getAttribute("data-index");
                    deleteConfirmation.classList.remove("hidden");
                }
            });
            
            confirmDelete.addEventListener("click", function () {
                if (deleteIndex !== null) {
                    let posts = JSON.parse(localStorage.getItem("posts")) || [];
                    posts.splice(deleteIndex, 1);
                    localStorage.setItem("posts", JSON.stringify(posts));
                    loadPosts();
                    deleteIndex = null;
                    deleteConfirmation.classList.add("hidden");
                }
            });
            
            cancelDelete.addEventListener("click", function () {
                deleteConfirmation.classList.add("hidden");
            });
            
            deleteAllButton.addEventListener("click", function () {
                localStorage.removeItem("posts");
                loadPosts();
            });
            
            loadPosts();
        });
    </script>
</body>
</html>
