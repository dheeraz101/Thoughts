<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0; /* Subtle depth */
            border-bottom: 1px solid #2f3336;
        }
        h1 {
            font-size: 1.3rem; /* 20.8px */
            font-weight: 700; /* Bold but refined */
        }
        .input-section {
            padding: 12px 0; /* Consistent spacing */
            border-bottom: 1px solid #2f3336;
        }
        .input-wrapper {
            margin-bottom: 8px; /* Balanced spacing */
        }
        #public-input {
            width: 100%;
            min-height: 56px; /* Compact yet usable */
            background-color: #000000;
            border: 1px solid #333;
            padding: 10px; /* Precise padding */
            border-radius: 8px; /* Soft Apple radius */
            outline: none;
            color: #ffffff;
            caret-color: #ffffff;
            resize: none;
            font-size: 1.125rem; /* 18px */
            font-weight: 400;
            line-height: 1.5;
            overflow: hidden;
            box-sizing: border-box;
            transition: border-color 0.2s ease; /* Subtle depth */
        }
        #public-input:focus {
            border-color: #ffffff;
        }
        #public-input::selection {
            background-color: rgba(29, 155, 240, 0.3);
            color: #ffffff;
        }
        #public-input::placeholder {
            color: #71767b;
            font-weight: 400;
        }
        .input-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }
        #char-count {
            font-size: 0.9375rem; /* 15px, subtle */
            font-weight: 400;
            color: #71767b;
        }
        #post-button {
            padding: 6px 14px; /* Compact, tactile */
            font-size: 0.9375rem; /* 15px */
            font-weight: 600;
            border-radius: 9999px;
            background-color: #1d9bf0;
            color: #ffffff;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        #post-button:hover {
            background-color: #1a8cd8;
        }
        .post-container {
            padding: 12px 0;
        }
        .post {
            padding: 12px 0;
            border-bottom: 1px solid #2f3336;
        }
        .post-content {
            font-size: 1.0625rem; /* 17px */
            font-weight: 400;
            line-height: 1.5;
        }
        .post-content .hashtag {
            color: #1d9bf0;
        }
        .post-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 0.9375rem; /* 15px */
            font-weight: 400;
            color: #71767b;
        }
        .delete-post {
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .delete-post:hover {
            color: #f4212e;
        }
        .twitter-popup {
            background-color: #14171A;
            border-radius: 14px;
            padding: 16px;
            max-width: 300px;
            width: 100%;
            box-shadow: 0 0 0 1px rgba(136, 153, 166, 0.2), 0 5px 15px rgba(0, 0, 0, 0.5);
            color: #ffffff;
            text-align: center;
        }
        @media (max-width: 768px) {
            .container {
                max-width: 100%;
                padding: 0 10px; /* Apple's standard padding */
            }
            
            header {
                padding: 16px 0; /* Increased vertical rhythm */
            }
            
            h1 {
                font-size: 17px; /* Apple's standard text size */
                letter-spacing: -0.022em; /* Apple's text tracking */
            }
            
            .input-section {
                padding: 12px 0;
            }
            
            #public-input {
                min-height: 44px; /* Apple's standard touch target */
                padding: 12px;
                font-size: 17px; /* Apple's body text size */
                line-height: 1.47059; /* Apple's line height */
                border-radius: 14px; /* Apple's modern radius */
            }
            
            .input-footer {
                margin-top: 8px;
                padding: 0 4px;
            }
            
            #char-count {
                font-size: 13px; /* Apple's caption size */
                letter-spacing: -0.008em;
            }
            
            #post-button {
                height: 36px; /* Apple's button height */
                padding: 0 16px;
                font-size: 15px; /* Apple's button text size */
                font-weight: 500;
                letter-spacing: -0.016em;
            }
            
            .post {
                padding: 16px 0;
            }
            
            .post-content {
                font-size: 17px; /* Apple's body text size */
                line-height: 1.47059;
                letter-spacing: -0.022em;
            }
            
            .post-meta {
                margin-top: 8px;
                font-size: 13px; /* Apple's caption size */
                letter-spacing: -0.008em;
            }
            
            .delete-post {
                padding: 8px;
                margin: -8px;
            }
            
            /* Popup improvements */
            .twitter-popup {
                border-radius: 14px;
                padding: 20px;
            }
            
            .twitter-popup p {
                font-size: 17px;
                letter-spacing: -0.022em;
                line-height: 1.47059;
            }
            
            .twitter-popup button {
                height: 44px; /* Apple's primary button height */
                margin-top: 12px;
                font-size: 15px;
                letter-spacing: -0.016em;
            }
        }
    </style>
</head>
<body class="bg-black text-white flex justify-center p-4">
    <div class="container w-full max-w-3xl">
        <header>
            <h1>X Clone</h1>
            <button id="delete-all" class="text-red-500 hover:text-red-400">Delete All</button>
        </header>

        <div class="input-section">
            <div class="input-wrapper">
                <textarea id="public-input" placeholder="What's happening?"></textarea>
            </div>
            <div class="input-footer">
                <span id="char-count">0/500</span>
                <button id="post-button">Post</button>
            </div>
        </div>

        <div id="post-container" class="post-container"></div>
    </div>

    <div id="delete-confirmation" class="fixed inset-0 bg-[#000000] bg-opacity-60 hidden flex justify-center items-center p-4">
        <div class="twitter-popup">
            <p class="mb-4 text-[15px] font-bold">Delete post?</p>
            <p class="text-twitter-gray text-[13px] mb-4">This can’t be undone and it will be removed from your timeline.</p>
            <button id="confirm-delete" class="bg-red-500 text-white px-4 py-1.5 rounded-full font-bold w-full mb-2 hover:bg-red-600">Delete</button>
            <button id="cancel-delete" class="bg-[#ffffff] text-black px-4 py-1.5 rounded-full font-bold w-full hover:bg-[#e6e6e6]">Cancel</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const postButton = document.getElementById("post-button");
            const postContainer = document.getElementById("post-container");
            const inputWrapper = document.getElementById("public-input");
            const charCount = document.getElementById("char-count");
            const deleteAllButton = document.getElementById("delete-all");
            const deleteConfirmation = document.getElementById("delete-confirmation");
            const confirmDelete = document.getElementById("confirm-delete");
            const cancelDelete = document.getElementById("cancel-delete");
            let deleteIndex = null;

            function highlightHashtags(text) {
                return text.replace(/(\s|^)(#\w+)/g, '$1<span class="hashtag">$2</span>')
                           .replace(/\n/g, "<br>");
            }

            function adjustHeight() {
                inputWrapper.style.height = "auto";
                inputWrapper.style.height = `${inputWrapper.scrollHeight}px`;
            }

            inputWrapper.addEventListener("input", function () {
                const text = this.value;
                adjustHeight();
                charCount.textContent = `${text.length}/500`;
                charCount.classList.toggle("text-red-500", text.length > 500);
            });

            adjustHeight();
            inputWrapper.addEventListener("paste", adjustHeight);

            postButton.addEventListener("click", function () {
                const text = inputWrapper.value.trim();
                if (!text || text.length > 500) return;
                savePost(text);
                inputWrapper.value = "";
                adjustHeight();
                charCount.textContent = "0/500";
                charCount.classList.remove("text-red-500");
            });

            function savePost(text) {
                let posts = JSON.parse(localStorage.getItem("posts")) || [];
                posts.push({ text, timestamp: new Date().toLocaleString() });
                localStorage.setItem("posts", JSON.stringify(posts));
                renderPosts();
            }

            function renderPosts() {
                const posts = JSON.parse(localStorage.getItem("posts")) || [];
                postContainer.innerHTML = "";
                posts.forEach((post, index) => {
                    const postElement = document.createElement("div");
                    postElement.className = "post";
                    postElement.innerHTML = `
                        <div class="post-content">${highlightHashtags(post.text)}</div>
                        <div class="post-meta">
                            <small>${post.timestamp.replace(/, /, " • ")} • ${post.text.length} chars</small>
                            <button class="delete-post" data-index="${index}">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    `;
                    postContainer.prepend(postElement);
                });

                document.querySelectorAll(".delete-post").forEach(button => {
                    button.addEventListener("click", function () {
                        deleteIndex = this.getAttribute("data-index");
                        deleteConfirmation.classList.remove("hidden");
                    });
                });
            }

            confirmDelete.addEventListener("click", function () {
                if (deleteIndex !== null) {
                    let posts = JSON.parse(localStorage.getItem("posts")) || [];
                    posts.splice(deleteIndex, 1);
                    localStorage.setItem("posts", JSON.stringify(posts));
                    renderPosts();
                    deleteConfirmation.classList.add("hidden");
                    deleteIndex = null;
                }
            });

            cancelDelete.addEventListener("click", function () {
                deleteConfirmation.classList.add("hidden");
                deleteIndex = null;
            });

            deleteAllButton.addEventListener("click", function () {
                localStorage.removeItem("posts");
                renderPosts();
            });

            renderPosts();
        });
    </script>
</body>
</html>
