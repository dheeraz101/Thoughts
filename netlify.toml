# Default: Cache everything for a long time
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache OGG files for a longer duration
[[headers]]
  for = "*.ogg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "audio/ogg"

# No caching for service worker
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Fresh manifest for update checks
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/manifest+json; charset=utf-8"

# Fresh index.html to ensure latest script.js loads
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Revalidate scripts & styles
[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/custom.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Fresh languages.json
[[headers]]
  for = "/languages.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

