# HTML — always fresh
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Service worker — always fresh
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Manifest — always fresh (for update detection)
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/manifest+json; charset=utf-8"

# JS — revalidate
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# CSS — revalidate
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Languages — revalidate
[[headers]]
  for = "/languages.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sound files — cache long-term (immutable assets)
[[headers]]
  for = "/sounds/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "audio/ogg"

# Icons — cache long-term
[[headers]]
  for = "/icon-*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Screenshots — cache long-term
[[headers]]
  for = "/screenshots/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Confetti library — cache long-term (vendor code)
[[headers]]
  for = "/confetti.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
